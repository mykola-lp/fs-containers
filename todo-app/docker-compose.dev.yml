services:
  frontend:
    # image: todo-front-dev
    build:
      context: ./todo-frontend
      dockerfile: dev.Dockerfile
    volumes:
      - ./todo-frontend:/usr/src/app
      - /usr/src/app/node_modules
    # ports:
    #   - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - todo-app-network

  backend:
    # image: todo-back-dev
    build:
      context: ./todo-backend
      dockerfile: dev.Dockerfile
    volumes:
      - ./todo-backend:/usr/src/app
      - /usr/src/app/node_modules
    # ports:
    #   - "3001:3001"
    environment:
      - MONGO_URL=${MONGO_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - mongo
      - redis
    networks:
      - todo-app-network

  mongo:
    image: mongo
    ports:
      - "3456:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - ./todo-backend/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - todo-app-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - todo-app-network

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "8080:80"
    container_name: reverse-proxy
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - todo-app-network

volumes:
  mongo_data:
  redis_data:

networks:
  todo-app-network:
    driver: bridge