services:
  # Frontend React app
  app:
    build:
      context: ./todo-frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    image: todo-front
    restart: unless-stopped
    networks:
      - todo-app-network

  # Backend Express app
  backend:
    build:
      context: ./todo-backend
      dockerfile: Dockerfile
    image: todo-backend
    restart: unless-stopped
    environment:
      MONGO_URL: ${MONGO_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: production
    depends_on:
      - mongo
      - redis
    networks:
      - todo-app-network

  mongo:
    image: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
      - ./todo-backend/mongo/mongo-init.js:/docker-entrypoint-initdb.d/init-mongo.js
    networks:
      - todo-app-network

  redis:
    image: redis:7
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    networks:
      - todo-app-network

  # Nginx reverse proxy
  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - backend
    networks:
      - todo-app-network

# Docker volumes for persistent storage
volumes:
  mongo_data:
  redis_data:

# Docker network for internal communication
networks:
  todo-app-network:
    driver: bridge


# 1- frontend BUILD
# docker build \
#   --build-arg VITE_BACKEND_URL=/api \
#   -t todo-front \
#   ./todo-frontend

# 2- backend BUILD
# docker build -t todo-backend ./todo-backend

# 3 - just UP
# docker compose up -d

